<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bartender</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Telegram WebApp runtime (must load before app code). -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <main id="screen-root" class="screen-root">
      <!-- Screens render here -->
    </main>

    <nav class="pillnav" id="pillnav">
      <div class="pillnav-inner" id="pillnav-inner">
        <div class="pillnav-links" id="pillnav-links">
          <div class="pillnav-indicator" id="pillnav-indicator"></div>
          <button class="pillnav-link" data-screen="shop" aria-label="Shop">
            <span class="pillnav-label">Shop</span>
          </button>
          <button class="pillnav-link" data-screen="play" aria-label="Play">
            <span class="pillnav-label">Play</span>
          </button>
          <button class="pillnav-link pillnav-link-home" data-screen="home" aria-label="Home">
            <span class="pillnav-label">Home</span>
          </button>
          <button class="pillnav-link" data-screen="leaderboard" aria-label="Ranks">
            <span class="pillnav-label">Ranks</span>
          </button>
          <button class="pillnav-link" data-screen="invites" aria-label="Invites">
            <span class="pillnav-label">Invites</span>
          </button>
        </div>
      </div>
    </nav>
  </div>

  <!-- Age gate overlay (shown before Play). -->
  <div id="age-gate" class="overlay hidden" aria-hidden="true"></div>

  <!-- Toast host -->
  <div id="toast-host" class="toast-host"></div>

  <!-- Config first, then libs, screens, games, and bootstrap last. -->
  <script src="config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/rank.js"></script>
  <script src="js/games/common.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/games/flip.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/towers.js"></script>
  <script src="js/games/highlow.js"></script>
  <script src="js/games/plinko.js"></script>
  <script src="js/games/rps.js"></script>
  <script src="js/games/chicken.js"></script>
  <script src="js/games/crash.js"></script>
  <script src="js/games/blackjack.js"></script>
  <script src="js/games/keno.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/shop.js"></script>
  <script src="js/screens/play.js"></script>
  <script src="js/screens/leaderboard.js"></script>
  <script src="js/screens/invites.js"></script>
  <script src="js/screens/vip.js"></script>
  <script src="js/bets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
