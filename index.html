<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bartender</title>
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Telegram WebApp runtime (must load before app code). -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="topbar-brand">✦ Bartender</div>
      <div class="topbar-balance" id="topbar-balance">
        <span class="bal-value" id="bal-value">—</span>
        <span class="bal-label">pts</span>
      </div>
    </header>

    <main id="screen-root" class="screen-root">
      <!-- Screens render here -->
    </main>

    <nav class="tabbar" id="tabbar">
      <button class="tab" data-screen="home">
        <span class="tab-ico">⌂</span><span class="tab-label">Home</span>
      </button>
      <button class="tab" data-screen="shop">
        <span class="tab-ico">▣</span><span class="tab-label">Shop</span>
      </button>
      <button class="tab" data-screen="play">
        <span class="tab-ico">⚅</span><span class="tab-label">Play</span>
      </button>
      <button class="tab" data-screen="leaderboard">
        <span class="tab-ico">♛</span><span class="tab-label">Ranks</span>
      </button>
      <button class="tab" data-screen="support">
        <span class="tab-ico">?</span><span class="tab-label">Support</span>
      </button>
    </nav>
  </div>

  <!-- Age gate overlay (shown before Play). -->
  <div id="age-gate" class="overlay hidden" aria-hidden="true"></div>

  <!-- Toast host -->
  <div id="toast-host" class="toast-host"></div>

  <!-- Config first, then libs, screens, games, and bootstrap last. -->
  <script src="config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script src="js/games/common.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/games/flip.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/towers.js"></script>
  <script src="js/games/highlow.js"></script>
  <script src="js/games/plinko.js"></script>
  <script src="js/screens/home.js"></script>
  <script src="js/screens/shop.js"></script>
  <script src="js/screens/play.js"></script>
  <script src="js/screens/leaderboard.js"></script>
  <script src="js/screens/support.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
